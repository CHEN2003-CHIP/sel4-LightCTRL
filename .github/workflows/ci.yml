name: CI

on:
  push:
  pull_request:

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install host build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Run host-side policy tests
        run: make test-policy
      - name: Run host-side fault tests
        run: make test-fault

  smoke:
    runs-on: ubuntu-latest
    if: ${{ vars.MICROKIT_SDK_URL != '' }}
    env:
      MICROKIT_SDK_URL: ${{ vars.MICROKIT_SDK_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Install QEMU and cross toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu qemu-system-arm curl xz-utils
      - name: Fetch Microkit SDK
        run: |
          curl -L "$MICROKIT_SDK_URL" -o /tmp/microkit-sdk.tar.gz
          mkdir -p ..
          tar -xf /tmp/microkit-sdk.tar.gz -C ..
      - name: Run smoke test
        run: make smoke
